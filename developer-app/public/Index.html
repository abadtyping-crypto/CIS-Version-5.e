<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    :root { --primary: #1a73e8; --success: #25D366; }
    body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; padding: 20px; }
    .dashboard { max-width: 900px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .header { padding: 20px; display: flex; gap: 15px; border-bottom: 1px solid #eee; align-items: center; }
    #searchInput { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
    
    .btn-sync { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-sync:disabled { background: #ccc; cursor: not-allowed; }

    .file-table { width: 100%; border-collapse: collapse; }
    .file-row td { padding: 15px 20px; border-bottom: 1px solid #f1f1f1; }
    .btn-wa { background: var(--success); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: 600; }

    /* Modal */
    #editModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; }
    .modal-box { width: 350px; margin: 15% auto; background: white; padding: 25px; border-radius: 12px; text-align: center; }
    .modal-box input { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    
    #toast { visibility:hidden; position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:12px 20px; border-radius:50px; font-size:14px; }
    #toast.show { visibility:visible; }
  </style>
</head>
<body>

<div class="dashboard">
  <div class="header">
    <input type="text" id="searchInput" placeholder="🔍 Search files..." onkeyup="filter()">
    <button id="sBtn" class="btn-sync" onclick="startSync()">🔄 Sync</button>
  </div>
  <table class="file-table">
    <tbody id="list"></tbody>
  </table>
</div>

<div id="editModal">
  <div class="modal-box">
    <h3 style="margin:0">Rename for WhatsApp</h3>
    <input type="text" id="manualName">
    <div style="display:flex; gap:10px">
      <button onclick="closeModal()" style="flex:1; padding:10px; border:none; border-radius:5px; cursor:pointer">Cancel</button>
      <button id="copyBtn" style="flex:1; padding:10px; border:none; border-radius:5px; background:var(--success); color:white; font-weight:bold; cursor:pointer">Copy Link</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let allRows = [];

  // 1. Initial Load
  window.onload = function() {
    google.script.run.withSuccessHandler(function(data) {
      allRows = data.slice(1);
      render(allRows);
    }).getSheetData();
  };

  function render(data) {
    const list = document.getElementById('list');
    list.innerHTML = data.map(function(r) {
      return '<tr class="file-row">' +
        '<td><b>' + r[0] + '</b><br><small style="color:gray">' + r[3] + '</small></td>' +
        '<td style="text-align:right"><button class="btn-wa" onclick="openRename(\'' + r[0].replace(/'/g, "\\'") + '\',\'' + r[4] + '\')">📋 WhatsApp</button></td>' +
      '</tr>';
    }).join('');
  }

  function filter() {
    const val = document.getElementById('searchInput').value.toLowerCase();
    render(allRows.filter(function(r) { return r[0].toLowerCase().indexOf(val) > -1; }));
  }

  // 2. THE SYNC (Fixed with immediate UI response)
  function startSync() {
    const btn = document.getElementById('sBtn');
    btn.disabled = true;
    btn.innerText = "⌛ Syncing...";
    
    google.script.run
      .withSuccessHandler(function(msg) {
        btn.disabled = false;
        btn.innerText = "🔄 Sync";
        showMsg("✅ " + msg);
        // Refresh the list
        google.script.run.withSuccessHandler(function(data) {
          allRows = data.slice(1);
          render(allRows);
        }).getSheetData();
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        btn.innerText = "🔄 Sync";
        showMsg("❌ Error: " + err);
      })
      .syncDriveToSheet();
  }

  // 3. Rename Logic
  function openRename(name, url) {
    document.getElementById('manualName').value = name;
    document.getElementById('editModal').style.display = 'block';
    document.getElementById('copyBtn').onclick = function() {
      const cleanName = document.getElementById('manualName').value;
      const text = "📄 *Document:* " + cleanName + "\n\n👇 *Download link:*\n" + url;
      const el = document.createElement('textarea');
      el.value = text; document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el);
      closeModal();
      showMsg("📋 Copied to clipboard!");
    };
  }

  function closeModal() { document.getElementById('editModal').style.display = 'none'; }
  function showMsg(m) { 
    const t = document.getElementById('toast'); 
    t.innerText = m; t.className = "show"; 
    setTimeout(function(){ t.className = ""; }, 3000); 
  }
</script>

</body>
</html>
